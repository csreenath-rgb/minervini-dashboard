name: Watchlist alerts

on:
  schedule:
    # Preset daily slots in UTC; each watchlist picks which it wants.
    # ~9:45am / 12:45pm / 3:45pm ET in summer (one hour earlier in winter).
    # Cron is best-effort and may run late. SLOT_CRON tells the script which slot fired.
    - cron: '45 13 * * 1-5'
    - cron: '45 16 * * 1-5'
    - cron: '45 19 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  check-and-alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check watchlist for entry/exit triggers
        env:
          MAILING_LISTS: ${{ secrets.MAILING_LISTS }}
          MAILING_LISTS_IN: ${{ secrets.MAILING_LISTS_IN }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          SLOT_CRON: ${{ github.event.schedule }}
          FUNDAMENTALS_PROVIDER: ${{ secrets.FUNDAMENTALS_PROVIDER }}
          FUNDAMENTALS_API_KEY: ${{ secrets.FUNDAMENTALS_API_KEY }}
          INDIANAPI_KEY: ${{ secrets.INDIANAPI_KEY }}
          SYNC_GIST_ID: ${{ secrets.SYNC_GIST_ID }}
        run: node scripts/check_alerts.mjs watchlist.json alerts.json

      - name: Email triggered alerts
        if: always()
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python3 scripts/send_email.py alerts.json
